<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Marcos — Gestão Financeira</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
  :root{
    --bg:#f0f4f8;--sidebar:#1e3a5f;--sidebar-hover:#2a4f7c;--primary:#1a56db;
    --primary-light:#e1effe;--success:#057a55;--success-light:#d1fae5;
    --danger:#e02424;--danger-light:#fde8e8;--warning:#c27803;--warning-light:#fef3c7;
    --white:#fff;--gray-50:#f9fafb;--gray-100:#f3f4f6;--gray-200:#e5e7eb;
    --gray-300:#d1d5db;--gray-500:#6b7280;--gray-700:#374151;--gray-900:#111827;
    --radius:10px;--shadow:0 1px 3px rgba(0,0,0,.1),0 1px 2px rgba(0,0,0,.06);
    --shadow-md:0 4px 6px -1px rgba(0,0,0,.1),0 2px 4px -1px rgba(0,0,0,.06);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--gray-700);display:flex;height:100vh;overflow:hidden}

  #sidebar{width:230px;background:var(--sidebar);display:flex;flex-direction:column;flex-shrink:0;overflow-y:auto}
  .sb-brand{padding:22px 20px 16px;border-bottom:1px solid rgba(255,255,255,.1)}
  .sb-brand h1{color:#fff;font-size:1.3rem;font-weight:700;letter-spacing:.5px}
  .sb-brand p{color:rgba(255,255,255,.5);font-size:.72rem;margin-top:2px}
  .sb-nav{padding:12px 0;flex:1}
  .sb-group{padding:10px 16px 4px;font-size:.67rem;font-weight:600;color:rgba(255,255,255,.4);text-transform:uppercase;letter-spacing:1px}
  .sb-item{display:flex;align-items:center;gap:10px;padding:9px 20px;cursor:pointer;color:rgba(255,255,255,.75);font-size:.85rem;transition:all .15s;border-left:3px solid transparent}
  .sb-item:hover{background:var(--sidebar-hover);color:#fff}
  .sb-item.active{background:var(--sidebar-hover);color:#fff;border-left-color:#60a5fa}
  .sb-item .icon{font-size:1rem;width:20px;text-align:center}
  .sb-pdf-btn{margin:12px 16px;padding:9px 14px;background:#2563eb;color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:.82rem;font-weight:600;display:flex;align-items:center;gap:8px;transition:background .15s}
  .sb-pdf-btn:hover{background:#1d4ed8}

  #main{flex:1;display:flex;flex-direction:column;overflow:hidden}
  .topbar{background:var(--white);padding:0 28px;height:58px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--gray-200);flex-shrink:0;box-shadow:var(--shadow)}
  .topbar h2{font-size:1.1rem;font-weight:700;color:var(--gray-900)}
  .topbar-actions{display:flex;gap:10px;align-items:center}
  .content{flex:1;overflow-y:auto;padding:24px 28px}

  .btn{padding:8px 16px;border:none;border-radius:7px;cursor:pointer;font-size:.83rem;font-weight:600;display:inline-flex;align-items:center;gap:6px;transition:all .15s}
  .btn-primary{background:var(--primary);color:#fff}.btn-primary:hover{background:#1648c0}
  .btn-success{background:var(--success);color:#fff}.btn-success:hover{background:#046c4e}
  .btn-danger{background:var(--danger);color:#fff}.btn-danger:hover{background:#c81e1e}
  .btn-ghost{background:transparent;color:var(--gray-700);border:1px solid var(--gray-300)}.btn-ghost:hover{background:var(--gray-100)}
  .btn-sm{padding:5px 11px;font-size:.77rem}
  .btn-icon{padding:5px 8px;font-size:.85rem}

  .kpi-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(170px,1fr));gap:14px;margin-bottom:22px}
  .kpi{background:var(--white);border-radius:var(--radius);padding:16px 18px;box-shadow:var(--shadow);border-left:4px solid var(--gray-200)}
  .kpi.blue{border-left-color:var(--primary)}.kpi.green{border-left-color:var(--success)}
  .kpi.red{border-left-color:var(--danger)}.kpi.yellow{border-left-color:var(--warning)}
  .kpi.purple{border-left-color:#7c3aed}.kpi.teal{border-left-color:#0891b2}
  .kpi-label{font-size:.72rem;color:var(--gray-500);font-weight:600;text-transform:uppercase;letter-spacing:.4px;margin-bottom:6px}
  .kpi-value{font-size:1.35rem;font-weight:700;color:var(--gray-900);line-height:1}
  .kpi-sub{font-size:.72rem;color:var(--gray-500);margin-top:4px}

  .charts-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:22px}
  .chart-card{background:var(--white);border-radius:var(--radius);padding:18px;box-shadow:var(--shadow)}
  .chart-card h3{font-size:.85rem;font-weight:700;color:var(--gray-700);margin-bottom:14px}
  .chart-wrap{position:relative;height:200px}

  .card{background:var(--white);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden;margin-bottom:18px}
  .card-head{padding:14px 18px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--gray-200)}
  .card-head h3{font-size:.9rem;font-weight:700;color:var(--gray-900)}
  .card-body{padding:18px}
  table{width:100%;border-collapse:collapse;font-size:.82rem}
  th{background:var(--gray-50);padding:9px 12px;text-align:left;font-size:.73rem;font-weight:600;color:var(--gray-500);text-transform:uppercase;letter-spacing:.4px;border-bottom:1px solid var(--gray-200)}
  td{padding:9px 12px;border-bottom:1px solid var(--gray-100);vertical-align:middle}
  tr:last-child td{border-bottom:none}
  tr:hover td{background:var(--gray-50)}
  .tbl-wrap{overflow-x:auto}

  .badge{display:inline-flex;align-items:center;padding:2px 9px;border-radius:99px;font-size:.72rem;font-weight:600}
  .badge-pago,.badge-recebido{background:var(--success-light);color:var(--success)}
  .badge-pendente{background:var(--warning-light);color:var(--warning)}
  .badge-atrasado{background:var(--danger-light);color:var(--danger)}
  .badge-a-receber{background:var(--primary-light);color:var(--primary)}
  .badge-1{background:#fee2e2;color:#b91c1c}
  .badge-2{background:#fef3c7;color:#92400e}
  .badge-3{background:#dbeafe;color:#1e40af}
  .badge-4{background:#d1fae5;color:#065f46}

  .filters{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-bottom:14px}
  .filters input,.filters select{padding:7px 11px;border:1px solid var(--gray-300);border-radius:7px;font-size:.82rem;background:var(--white);color:var(--gray-700)}
  .filters input:focus,.filters select:focus{outline:2px solid var(--primary);border-color:transparent}

  .modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:1000;align-items:center;justify-content:center}
  .modal-overlay.open{display:flex}
  .modal{background:var(--white);border-radius:14px;padding:28px;width:520px;max-width:95vw;max-height:88vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.2)}
  .modal h2{font-size:1.05rem;font-weight:700;margin-bottom:20px;color:var(--gray-900)}
  .form-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
  .form-grid .full{grid-column:1/-1}
  .form-group{display:flex;flex-direction:column;gap:5px}
  .form-group label{font-size:.78rem;font-weight:600;color:var(--gray-700)}
  .form-group input,.form-group select,.form-group textarea{padding:8px 11px;border:1px solid var(--gray-300);border-radius:7px;font-size:.83rem;color:var(--gray-700)}
  .form-group input:focus,.form-group select:focus,.form-group textarea:focus{outline:2px solid var(--primary);border-color:transparent}
  .modal-footer{display:flex;gap:10px;justify-content:flex-end;margin-top:20px;padding-top:16px;border-top:1px solid var(--gray-200)}

  .urgentes-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:12px;margin-bottom:22px}
  .urgente-card{background:var(--white);border-radius:var(--radius);padding:14px 16px;box-shadow:var(--shadow);border-top:3px solid var(--warning)}
  .urgente-card.critico{border-top-color:var(--danger)}
  .urgente-nome{font-size:.83rem;font-weight:700;color:var(--gray-900);margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .urgente-val{font-size:1rem;font-weight:700;color:var(--danger)}
  .urgente-info{font-size:.73rem;color:var(--gray-500);margin-top:3px}

  .cat-section{background:var(--white);border-radius:var(--radius);box-shadow:var(--shadow);padding:20px;margin-bottom:18px}
  .cat-section h3{font-size:.95rem;font-weight:700;color:var(--gray-900);margin-bottom:14px;display:flex;align-items:center;gap:8px}
  .cat-add-row{display:flex;gap:10px;margin-bottom:14px}
  .cat-add-row input{flex:1;padding:8px 12px;border:1px solid var(--gray-300);border-radius:7px;font-size:.83rem}
  .cat-add-row input:focus{outline:2px solid var(--primary);border-color:transparent}
  .cat-tags{display:flex;flex-wrap:wrap;gap:8px}
  .cat-tag{display:inline-flex;align-items:center;gap:6px;background:var(--gray-100);border:1px solid var(--gray-200);border-radius:99px;padding:4px 12px 4px 14px;font-size:.8rem;color:var(--gray-700)}
  .cat-tag.pagar{background:var(--primary-light);border-color:#bfdbfe;color:#1e40af}
  .cat-tag.receber{background:var(--success-light);border-color:#a7f3d0;color:#065f46}
  .cat-tag.cliente{background:#f5f3ff;border-color:#ddd6fe;color:#5b21b6}
  .cat-tag button{background:none;border:none;cursor:pointer;color:inherit;opacity:.5;font-size:.85rem;padding:0;line-height:1;display:flex;align-items:center}
  .cat-tag button:hover{opacity:1}
  .cat-empty{color:var(--gray-500);font-size:.82rem;font-style:italic}

  .pdf-option{display:flex;align-items:center;gap:10px;padding:12px 14px;border:2px solid var(--gray-200);border-radius:8px;cursor:pointer;margin-bottom:10px;transition:all .15s}
  .pdf-option:hover,.pdf-option.sel{border-color:var(--primary);background:var(--primary-light)}
  .pdf-option input{accent-color:var(--primary)}
  .pdf-option .pdf-opt-text{font-size:.85rem}
  .pdf-option .pdf-opt-text strong{display:block;color:var(--gray-900)}
  .pdf-option .pdf-opt-text span{color:var(--gray-500);font-size:.75rem}

  @media(max-width:900px){.charts-grid{grid-template-columns:1fr}.kpi-grid{grid-template-columns:repeat(2,1fr)}}
  @media(max-width:640px){ #sidebar{width:60px}.sb-item span,.sb-brand p,.sb-brand h1,.sb-group,.sb-pdf-btn span{display:none}.sb-brand{padding:16px 12px}.sb-item{padding:12px;justify-content:center}.content{padding:16px}}

  #toast-wrap{position:fixed;bottom:24px;right:24px;z-index:9999;display:flex;flex-direction:column;gap:8px}
  .toast{background:var(--gray-900);color:#fff;padding:10px 18px;border-radius:8px;font-size:.83rem;font-weight:500;animation:slideIn .2s ease;box-shadow:var(--shadow-md);max-width:300px}
  .toast.success{background:var(--success)}.toast.error{background:var(--danger)}
  @keyframes slideIn{from{transform:translateX(40px);opacity:0}to{transform:translateX(0);opacity:1}}

  .loading{display:flex;align-items:center;justify-content:center;padding:60px;color:var(--gray-500);font-size:.9rem;gap:10px}
  .spinner{width:20px;height:20px;border:2px solid var(--gray-300);border-top-color:var(--primary);border-radius:50%;animation:spin .7s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>

<div id="sidebar">
  <div class="sb-brand">
    <h1>📊 Marcos</h1>
    <p>Gestão Financeira</p>
  </div>
  <nav class="sb-nav">
    <div class="sb-group">Principal</div>
    <div class="sb-item active" onclick="showPage('dashboard')"><span class="icon">🏠</span><span>Dashboard</span></div>
    <div class="sb-group">Despesas</div>
    <div class="sb-item" onclick="showPage('nova-despesa')"><span class="icon">➕</span><span>Nova Despesa</span></div>
    <div class="sb-item" onclick="showPage('despesas')"><span class="icon">📋</span><span>Gerenciar</span></div>
    <div class="sb-group">Receitas</div>
    <div class="sb-item" onclick="showPage('nova-receita')"><span class="icon">➕</span><span>Nova Receita</span></div>
    <div class="sb-item" onclick="showPage('recebimentos')"><span class="icon">💰</span><span>Gerenciar</span></div>
    <div class="sb-group">Configurações</div>
    <div class="sb-item" onclick="showPage('categorias')"><span class="icon">🏷️</span><span>Categorias</span></div>
  </nav>
  <button class="sb-pdf-btn" onclick="openPdfModal()">
    <span>📄</span><span>Relatório PDF</span>
  </button>
</div>

<div id="main">
  <div class="topbar">
    <h2 id="page-title">Dashboard</h2>
    <div class="topbar-actions" id="topbar-actions"></div>
  </div>
  <div class="content" id="content">
    <div class="loading"><div class="spinner"></div> Carregando...</div>
  </div>
</div>

<div id="toast-wrap"></div>

<div class="modal-overlay" id="modal-overlay">
  <div class="modal" id="modal-box">
    <h2 id="modal-title"></h2>
    <div id="modal-body"></div>
    <div class="modal-footer" id="modal-footer"></div>
  </div>
</div>

<div class="modal-overlay" id="pdf-overlay">
  <div class="modal" style="max-width:420px">
    <h2>📄 Gerar Relatório PDF</h2>
    <div id="pdf-modal-body">
      <p style="font-size:.83rem;color:var(--gray-500);margin-bottom:16px">Escolha o tipo de relatório a gerar:</p>
      <label class="pdf-option sel" id="opt-completo">
        <input type="radio" name="pdf-tipo" value="completo" checked onchange="updatePdfOpts()">
        <div class="pdf-opt-text"><strong>Relatório Completo</strong><span>Dashboard + Despesas + Receitas</span></div>
      </label>
      <label class="pdf-option" id="opt-despesas">
        <input type="radio" name="pdf-tipo" value="despesas" onchange="updatePdfOpts()">
        <div class="pdf-opt-text"><strong>Somente Despesas</strong><span>Contas a pagar detalhadas</span></div>
      </label>
      <label class="pdf-option" id="opt-recebimentos">
        <input type="radio" name="pdf-tipo" value="recebimentos" onchange="updatePdfOpts()">
        <div class="pdf-opt-text"><strong>Somente Receitas</strong><span>Contas a receber detalhadas</span></div>
      </label>
      <div style="margin-top:16px">
        <label style="font-size:.78rem;font-weight:600;color:var(--gray-700);display:block;margin-bottom:5px">Filtrar por mês (opcional)</label>
        <input type="month" id="pdf-mes" style="padding:8px 12px;border:1px solid var(--gray-300);border-radius:7px;font-size:.83rem;width:100%">
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closePdfModal()">Cancelar</button>
      <button class="btn btn-primary" onclick="gerarPdf()" id="pdf-gen-btn">📥 Baixar PDF</button>
    </div>
  </div>
</div>

<script>
let CONFIG = {categorias:[], categorias_receber:[], formas:[], clientes:[]};
let currentPage = 'dashboard';
let charts = {};

const fmt = v => 'R$ ' + (v||0).toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2});
const fmtDate = s => s ? new Date(s+'T12:00').toLocaleDateString('pt-BR') : '';
const today = () => new Date().toISOString().slice(0,10);

function toast(msg, type='success', ms=3000){
  const w=document.getElementById('toast-wrap');
  const d=document.createElement('div');
  d.className='toast '+type; d.textContent=msg;
  w.appendChild(d); setTimeout(()=>d.remove(),ms);
}

function showPage(p){
  currentPage=p;
  document.querySelectorAll('.sb-item').forEach(el=>{
    el.classList.toggle('active', el.getAttribute('onclick')?.includes(`'${p}'`));
  });
  const titles={
    'dashboard':'Dashboard','nova-despesa':'Nova Despesa','despesas':'Gerenciar Despesas',
    'nova-receita':'Nova Receita','recebimentos':'Gerenciar Recebimentos','categorias':'Categorias'
  };
  document.getElementById('page-title').textContent = titles[p]||p;
  document.getElementById('topbar-actions').innerHTML='';
  Object.values(charts).forEach(c=>c.destroy());
  charts={};
  const c=document.getElementById('content');
  c.innerHTML='<div class="loading"><div class="spinner"></div> Carregando...</div>';
  if(p==='dashboard') loadDashboard();
  else if(p==='nova-despesa') renderFormDespesa();
  else if(p==='despesas') loadDespesas();
  else if(p==='nova-receita') renderFormReceita();
  else if(p==='recebimentos') loadRecebimentos();
  else if(p==='categorias') loadCategorias();
}

async function loadDashboard(){
  const [dash] = await Promise.all([fetch('/api/dashboard').then(r=>r.json())]);
  const c=document.getElementById('content');
  const saldoCls = dash.saldo_liquido>=0?'green':'red';

  c.innerHTML=`
  <div class="kpi-grid">
    <div class="kpi blue"><div class="kpi-label">Caixa Disponível</div><div class="kpi-value">${fmt(dash.caixa)}</div><div class="kpi-sub">
      <button class="btn btn-ghost btn-sm" onclick="editarCaixa(${dash.caixa})">Editar</button></div></div>
    <div class="kpi red"><div class="kpi-label">A Pagar (pendente)</div><div class="kpi-value">${fmt(dash.total_pagar)}</div><div class="kpi-sub">${dash.total_pendentes} contas</div></div>
    <div class="kpi green"><div class="kpi-label">A Receber</div><div class="kpi-value">${fmt(dash.ta_receber)}</div><div class="kpi-sub">Total esperado: ${fmt(dash.total_receber)}</div></div>
    <div class="kpi ${saldoCls}"><div class="kpi-label">Saldo Líquido</div><div class="kpi-value">${fmt(dash.saldo_liquido)}</div><div class="kpi-sub">Caixa + Receber - Pagar</div></div>
    <div class="kpi yellow"><div class="kpi-label">Vencidas</div><div class="kpi-value">${fmt(dash.vencidas)}</div><div class="kpi-sub">Contas em atraso</div></div>
    <div class="kpi teal"><div class="kpi-label">Meses de Caixa</div><div class="kpi-value">${dash.meses_caixa}</div><div class="kpi-sub">Autonomia financeira</div></div>
    <div class="kpi purple"><div class="kpi-label">Taxa Liquidação</div><div class="kpi-value">${dash.taxa_liquidacao}%</div><div class="kpi-sub">Do total pago</div></div>
  </div>

  ${dash.urgentes?.length?`
  <div class="card">
    <div class="card-head"><h3>⚠️ Vencendo em 7 dias</h3></div>
    <div class="card-body" style="padding:14px">
      <div class="urgentes-grid">${dash.urgentes.map(u=>`
        <div class="urgente-card${u.prioridade==='1-CRITICO'?' critico':''}">
          <div class="urgente-nome">${u.fornecedor||u.descricao||'—'}</div>
          <div class="urgente-val">${fmt(u.valor_previsto)}</div>
          <div class="urgente-info">
            ${fmtDate(u.vencimento)} · 
            ${u.dias<0?`<span style="color:var(--danger)">${Math.abs(u.dias)}d atrasado</span>`:`${u.dias}d restantes`}
            · ${u.categoria}
          </div>
        </div>`).join('')}
      </div>
    </div>
  </div>`:''}

  <div class="charts-grid">
    <div class="chart-card"><h3>Despesas por Mês</h3><div class="chart-wrap"><canvas id="ch-mes"></canvas></div></div>
    <div class="chart-card"><h3>Por Prioridade (pendentes)</h3><div class="chart-wrap"><canvas id="ch-prio"></canvas></div></div>
    <div class="chart-card"><h3>Receitas por Mês</h3><div class="chart-wrap"><canvas id="ch-recb"></canvas></div></div>
    <div class="chart-card"><h3>Top Categorias</h3><div class="chart-wrap"><canvas id="ch-cat"></canvas></div></div>
  </div>`;

  const meses = dash.por_mes || [];
  const labels = meses.map(m=>{ const [y,mo]=m.mes.split('-'); return ['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'][+mo-1]+'/'+y.slice(2); });
  charts.mes = new Chart(document.getElementById('ch-mes'),{type:'bar',data:{labels,datasets:[
    {label:'Pago',data:meses.map(m=>m.pago),backgroundColor:'#057a5588',borderColor:'#057a55',borderWidth:1},
    {label:'Pendente',data:meses.map(m=>m.pendente),backgroundColor:'#c2780388',borderColor:'#c27803',borderWidth:1}
  ]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{labels:{font:{size:10}}}},scales:{x:{stacked:true,ticks:{font:{size:9}}},y:{stacked:true,ticks:{font:{size:9},callback:v=>'R$'+v.toLocaleString('pt-BR')}}}}});

  const prios = dash.por_prioridade||{};
  const prioLabels = Object.keys(prios).sort();
  const prioColors = {'1-CRITICO':'#e02424','2-ALTO':'#c27803','3-MEDIO':'#1a56db','4-BAIXO':'#057a55','Pago':'#6b7280'};
  charts.prio = new Chart(document.getElementById('ch-prio'),{type:'doughnut',data:{labels:prioLabels,datasets:[{data:prioLabels.map(p=>prios[p].valor),backgroundColor:prioLabels.map(p=>prioColors[p]||'#aaa')}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'right',labels:{font:{size:10},boxWidth:12}}}}});

  const recbMes = dash.por_mes_recb||[];
  const labelsR = recbMes.map(m=>{ const [y,mo]=m.mes.split('-'); return ['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'][+mo-1]+'/'+y.slice(2); });
  charts.recb = new Chart(document.getElementById('ch-recb'),{type:'bar',data:{labels:labelsR,datasets:[
    {label:'Esperado',data:recbMes.map(m=>m.esperado),backgroundColor:'#1a56db44',borderColor:'#1a56db',borderWidth:1},
    {label:'Recebido',data:recbMes.map(m=>m.recebido),backgroundColor:'#057a5588',borderColor:'#057a55',borderWidth:1}

function renderDespesas(){

    if(busca && !`${d.fornecedor} ${d.descricao} ${d.categoria}`.toLowerCase().includes(busca)) return false;

  const prioBadge={'1-CRITICO':'badge-1','2-ALTO':'badge-2','3-MEDIO':'badge-3','4-BAIXO':'badge-4','Pago':'badge-pago'};

function openPdfModal(){ document.getElementById('pdf-overlay').classList.add('open'); }
function closePdfModal(){ document.getElementById('pdf-overlay').classList.remove('open'); }
function updatePdfOpts(){
  ['completo','despesas','recebimentos'].forEach(v=>{
    const radio = document.querySelector(`input[name="pdf-tipo"][value="${v}"]`);
    document.getElementById('opt-'+v).classList.toggle('sel', radio.checked);
  });
}
async function gerarPdf(){
  const tipo = document.querySelector('input[name="pdf-tipo"]:checked')?.value||'completo';
  const mes = document.getElementById('pdf-mes').value||'';
  const btn = document.getElementById('pdf-gen-btn');
  btn.textContent='⏳ Gerando...'; btn.disabled=true;
  let url = `/api/relatorio/pdf?tipo=${tipo}`;
  if(mes) url+=`&mes=${mes}`;
  try{
    const r = await fetch(url);
    if(!r.ok){ const d=await r.json(); throw new Error(d.erro||'Erro'); }
    const blob = await r.blob();
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = `relatorio_marcos_${new Date().toISOString().slice(0,10)}.pdf`;
    a.click();
    URL.revokeObjectURL(a.href);
    closePdfModal();
    toast('PDF baixado com sucesso!');
  }catch(err){
    toast('Erro ao gerar PDF: '+err.message,'error',5000);
  }finally{
    btn.textContent='📥 Baixar PDF'; btn.disabled=false;
  }
}

function openModal(title, bodyHtml, btns=[]){
  document.getElementById('modal-title').textContent=title;
  document.getElementById('modal-body').innerHTML=bodyHtml;
  document.getElementById('modal-footer').innerHTML=btns.map(b=>
    `<button class="btn ${b.cls}" onclick="${b.fn}">${b.label}</button>`).join('');
  document.getElementById('modal-overlay').classList.add('open');
}
